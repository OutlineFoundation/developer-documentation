name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-translations:
    name: Verify Translations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python scripts/verify_translations.py

  build:
    name: Build (${{ matrix.locale }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        locale: [en, de]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx docusaurus build --locale ${{ matrix.locale }}
