<p>使用 Outline 前，建議瞭解一些核心概念。</p>

<h2 data-text="3741584843529720981" id="how_outline_works" tabindex="-1">Outline 的運作方式</h2>

<ul>
<li><strong>存取受限：</strong>使用者無法自由存取開放的網際網路。</li>
<li><strong>Outline Manager：</strong>建立雲端伺服器及產生存取金鑰的工具。</li>
<li><strong>發布金鑰：</strong>與親友分享金鑰。</li>
<li><strong>通道流量：</strong>使用者安裝 Outline 用戶端，並利用金鑰建立安全通道，從而避開審查。</li>
</ul>
