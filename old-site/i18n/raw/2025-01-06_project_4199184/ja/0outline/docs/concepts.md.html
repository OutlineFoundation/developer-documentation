<p>Outline を使用する前に、基本的なコンセプトを確認すると役立ちます。</p>

<h2 data-text="3741584843529720981" id="how_outline_works" tabindex="-1">Outline の仕組み</h2>

<ul>
<li><strong>ブロックされたアクセス:</strong> ユーザーはオープン インターネットへのアクセスが制限されます。</li>
<li><strong>Outline マネージャー:</strong> 管理者はクラウドでサーバーを作成し、アクセスキーを生成します。</li>
<li><strong>キーを配布する:</strong> これらのキーを家族や友人と共有します。</li>
<li><strong>トラフィックをトンネリングする:</strong> ユーザーは Outline クライアントをインストールし、キーを使用してセキュア トンネルを確立し、検閲を回避します。</li>
</ul>
