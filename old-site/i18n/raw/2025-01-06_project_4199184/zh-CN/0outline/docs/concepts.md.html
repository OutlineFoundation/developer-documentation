<p>使用 Outline 前，首先来了解一些核心概念会非常有帮助。</p>

<h2 data-text="3741584843529720981" id="how_outline_works" tabindex="-1">Outline 的工作原理</h2>

<ul>
<li><strong>访问被禁止</strong>：用户在访问开放互联网时面临一定的限制。</li>
<li><strong>Outline 管理器</strong>：在云端创建服务器，并生成访问密钥。</li>
<li><strong>分发密钥</strong>：将这些密钥共享给亲友。</li>
<li><strong>隧道流量</strong>：用户安装 Outline 客户端，并使用密钥建立安全隧道，绕开审查。</li>
</ul>
