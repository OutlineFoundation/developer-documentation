<p>本指南將逐步引導您設定 Outline 伺服器，讓您可以安全且不受限制地存取網際網路。</p>

<h2 data-text="4807615820961821477" id="prerequisites" tabindex="-1">事前準備</h2>

<ul>
<li>一部實體或虛擬伺服器，搭載支援的作業系統 (Ubuntu 20.04 LTS 或 Debian 10)</li>
<li>該伺服器的 root 或 sudo 存取權</li>
</ul>

<h2 data-text="12628245661512439499" id="instructions" tabindex="-1">操作說明</h2>

<ol>
<li><p>下載並執行 Outline 安裝指令碼。</p>
<div></div><devsite-code><!-- notranslate l10n-placeholder: l10n-placeholder1 --></devsite-code></li>
<li><p>按照畫面上的提示操作。</p></li>
</ol>
