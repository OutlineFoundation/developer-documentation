<p>Outline을 사용하기 전에 핵심 개념을 살펴보는 것이 좋습니다.</p>

<h2 data-text="3741584843529720981" id="how_outline_works" tabindex="-1">Outline의 작동 원리</h2>

<ul>
<li><strong>차단된 액세스:</strong> 사용자가 개방형 인터넷에 액세스하는 데 제한이 있습니다.</li>
<li><strong>Outline Manager:</strong> 서버를 클라우드에서 만들고 액세스 키를 생성합니다.</li>
<li><strong>키 배포:</strong> 이러한 키를 친구나 가족과 공유합니다.</li>
<li><strong>터널 트래픽:</strong> 사용자가 Outline 클라이언트를 설치하고 키를 사용하여 안전한 터널을 설정해 검열을 우회합니다.</li>
</ul>
